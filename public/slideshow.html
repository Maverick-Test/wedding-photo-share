<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slideshow</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="slideshow-body">
  <div id="stage" class="stage">
    <div id="slideA" class="slide"></div>
    <div id="slideB" class="slide"></div>
  </div>
  <div id="placeholder" class="slide-placeholder">
    <h1 id="ssAlbum">📸</h1>
    <p>Waiting for the first photo…</p>
  </div>
  <div id="hud" class="slide-hud">
    <span id="ssCount">0</span> photos · press <kbd>F</kbd> for full-screen · <kbd>Esc</kbd> to exit
  </div>

  <script src="js/config.js"></script>
  <script src="js/slideshow.js"></script>
</body>
</html>
