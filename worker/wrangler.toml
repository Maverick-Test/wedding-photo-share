name = "photo-share"
main = "src/index.js"
compatibility_date = "2024-09-01"

# Cron triggers (UTC):
#   0 3 24 * *  -> 7-day warning before cleanup (deletes happen on the 1st)
#   0 3 1  * *  -> monthly cleanup
[triggers]
crons = ["0 3 24 * *", "0 3 1 * *"]

# Replace with your Pages site origin (e.g. "https://maverick-test.github.io")
# Comma-separated list is supported. Leave "*" only while testing.
[vars]
# Comma-separated list of allowed origins. Use "*" only for testing.
ALLOWED_ORIGINS = "https://maverick-test.github.io,http://localhost:8000"
PUBLIC_BASE_URL = "" # Optional. If set, /list returns URLs like {PUBLIC_BASE_URL}/{key}. Otherwise URLs are served by the Worker.
MAX_UPLOAD_BYTES = "52428800" # 50 MB
# After this UTC timestamp, /upload returns 403. /list and /photo keep working.
# Leave empty to allow uploads forever. Format: "2026-06-15T23:59:59Z"
UPLOAD_DEADLINE = "2026-05-23T03:59:59Z"  # = May 22, 2026 11:59 PM ET (7 days after May 15)

# Auto-cleanup behaviour. Runs via the cron trigger above.
# "month"   : on the 1st of each month, delete objects uploaded before the start of the previous month (gives ~30+ days retention)
# "days"    : delete objects uploaded more than CLEANUP_RETENTION_DAYS ago
# "off"     : never auto-delete
CLEANUP_MODE = "month"
CLEANUP_RETENTION_DAYS = "60"

# Email notifications via Resend (https://resend.com). Free 100 emails/day.
# Set the API key as a secret:  cd worker && npx wrangler secret put RESEND_API_KEY
# Leave NOTIFY_EMAIL empty to disable email notifications.
NOTIFY_EMAIL = "josumah@gmail.com"   # or wherever
NOTIFY_FROM  = "Photo Share <onboarding@resend.dev>"  # change once you verify your own domain

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "photo-share"
preview_bucket_name = "photo-share"
